<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <title>SVoice — Anslutning klar</title>
  <style>
    :root {
      --charcoal: #1a1615;
      --ivory: #f3ede3;
      --amber: #d4a955;
      --amber-dim: rgba(212, 169, 85, 0.14);
    }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--charcoal);
      color: var(--ivory);
      font-family: -apple-system, "Segoe UI", Inter, system-ui, sans-serif;
    }
    body {
      display: grid;
      place-items: center;
    }
    .card {
      text-align: center;
      max-width: 420px;
      padding: 48px 36px;
      background: linear-gradient(180deg, rgba(243, 237, 227, 0.04), rgba(243, 237, 227, 0.01));
      border: 1px solid rgba(243, 237, 227, 0.08);
      border-radius: 14px;
    }
    .check {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: var(--amber-dim);
      display: grid;
      place-items: center;
      animation: pop 0.6s cubic-bezier(0.2, 0.9, 0.3, 1.2);
    }
    .check svg {
      width: 32px;
      height: 32px;
      color: var(--amber);
    }
    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 500;
      font-size: 28px;
      margin: 0 0 12px;
      letter-spacing: -0.01em;
    }
    p {
      margin: 0;
      color: rgba(243, 237, 227, 0.72);
      line-height: 1.5;
      font-size: 15px;
    }
    code {
      color: var(--amber);
      font-family: "JetBrains Mono", Menlo, monospace;
      font-size: 13px;
    }
    @keyframes pop {
      0% { transform: scale(0.3); opacity: 0; }
      70% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>Anslutning klar</h1>
    <p>Du kan stänga den här fliken och återvända till <code>SVoice</code>.</p>
  </div>
</body>
</html>
